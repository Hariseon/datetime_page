<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор даты и времени</title>
    <!-- Подключаем скрипт Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #222);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h2 {
            color: var(--tg-theme-hint-color, #666);
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 10px;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            margin: 20px 0;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:active {
            opacity: 0.8;
        }
        .note {
            margin-top: 20px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #888);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Выберите дату и время</h2>
        <input type="datetime-local" id="datetimePicker" step="60">
        <button onclick="sendData()">Готово</button>
        <p class="note">Выбранное время будет отправлено боту</p>
    </div>

    <script>
        // Инициализация Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Растягиваем на всю высоту
        tg.MainButton.hide(); // Скрываем основную кнопку (если не нужна)

        // Функция отправки данных
        function sendData() {
            const dateTimeInput = document.getElementById('datetimePicker');
            const value = dateTimeInput.value; // Формат: "YYYY-MM-DDTHH:mm"
            
            if (!value) {
                tg.showAlert('Пожалуйста, выберите дату и время');
                return;
            }

            // Разбираем строку на части (можно отправить как есть, но лучше структурировать)
            const [datePart, timePart] = value.split('T');
            const [year, month, day] = datePart.split('-');
            const [hour, minute] = timePart.split(':');

            // Формируем объект с данными
            const data = {
                date: {
                    year: parseInt(year),
                    month: parseInt(month),
                    day: parseInt(day)
                },
                time: {
                    hour: parseInt(hour),
                    minute: parseInt(minute)
                },
                iso: value,          // полная строка для простоты
                timestamp: new Date(value).getTime() / 1000 // Unix timestamp (секунды)
            };

            // Отправляем данные в бота
            tg.sendData(JSON.stringify(data));
            
            // Закрываем веб-приложение (опционально)
            tg.close();
        }

        // Можно также обработать нажатие основной кнопки Telegram, если хотите
        tg.MainButton.setText('Выбрать');
        tg.MainButton.onClick(sendData);
        tg.MainButton.show();
    </script>
</body>
</html>
