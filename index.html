<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор даты и времени</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #222);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h2 {
            color: var(--tg-theme-hint-color, #666);
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 10px;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            margin: 20px 0;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: var(--tg-theme-button-color, #40a7e3);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:active {
            opacity: 0.8;
        }
        .note {
            margin-top: 20px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #888);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Выберите дату и время</h2>
        <input type="datetime-local" id="datetimePicker" step="60">
        <button onclick="sendData()">Готово</button>
        <p class="note">Выбранное время будет отправлено боту</p>
    </div>

    <script>
        // Инициализация Telegram Web App
        let tg = null;
        
        if (typeof window.Telegram !== 'undefined' && window.Telegram.WebApp) {
            tg = window.Telegram.WebApp;
            tg.expand();
            tg.MainButton.hide();
            console.log("Telegram Web App инициализирован");
        } else {
            console.error("Telegram Web App не доступен. Возможно, страница открыта вне Telegram.");
            // Создаём заглушку для тестирования в браузере
            tg = {
                expand: () => {},
                MainButton: { hide: () => {}, setText: () => {}, onClick: () => {}, show: () => {} },
                showAlert: alert,
                sendData: (data) => console.log("sendData (stub):", data),
                close: () => {}
            };
        }

        // Глобальная функция для кнопки
        function sendData() {
            console.log("sendData вызвана");
            const dateTimeInput = document.getElementById('datetimePicker');
            const value = dateTimeInput.value;
            console.log("Выбранное значение:", value);

            if (!value) {
                if (tg && tg.showAlert) {
                    tg.showAlert('Пожалуйста, выберите дату и время');
                } else {
                    alert('Пожалуйста, выберите дату и время');
                }
                return;
            }

            // Разбираем строку
            const [datePart, timePart] = value.split('T');
            const [year, month, day] = datePart.split('-');
            const [hour, minute] = timePart.split(':');

            const data = {
                date: {
                    year: parseInt(year),
                    month: parseInt(month),
                    day: parseInt(day)
                },
                time: {
                    hour: parseInt(hour),
                    minute: parseInt(minute)
                },
                iso: value,
                timestamp: new Date(value).getTime() / 1000
            };
            console.log("Данные для отправки:", data);

            try {
                if (tg && tg.sendData) {
                    tg.sendData(JSON.stringify(data));
                    console.log("Данные отправлены успешно");
                } else {
                    console.error("tg.sendData не доступна");
                }
            } catch (e) {
                console.error("Ошибка при отправке данных:", e);
                if (tg && tg.showAlert) {
                    tg.showAlert("Ошибка: " + e.message);
                }
            }
        }

        // Настройка основной кнопки Telegram (опционально)
        if (tg) {
            tg.MainButton.setText('Выбрать');
            tg.MainButton.onClick(sendData);
            tg.MainButton.show();
        }
    </script>
</body>
</html>
